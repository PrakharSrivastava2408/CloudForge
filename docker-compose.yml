services:
  idp-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    image: idp-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - idp-backend
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - idp-network

  idp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: idp-backend:latest
    ports:
      - "3000:3000"
    volumes:
      - ./terraform:/terraform
      - ${HOME}/.aws:/home/node/.aws:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AWS_SDK_LOAD_CONFIG=1
    restart: unless-stopped
    networks:
      - idp-network

networks:
  idp-network:
    driver: bridge
